server:
  port: 8085

spring:
  application:
    name: notification-app

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bank_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:qwerty}

  liquibase:
    enabled: true
    change-log: classpath:db/master.xml
    default-schema: ${NOTIFICATION_DB_SCHEMA:notification_schema}

  jpa:
    properties:
      hibernate:
        default_schema: ${NOTIFICATION_DB_SCHEMA:notification_schema}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8080/realms/bank-realm}
          #issuer-uri: http://host.docker.internal:8080/realms/bank-realm

  kafka:
    bootstrap-servers: kafka-broker-0.kafka-headless.default.svc.cluster.local:9092
    #bootstrap-servers: localhost:9093
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

management:
  endpoints:
    web:
      exposure:
        include: "*"
logging:
  level:
    root: INFO
