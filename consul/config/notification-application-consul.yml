server:
  port: 8085

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:bank_db}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:qwerty}

  liquibase:
    enabled: true
    change-log: classpath:db/master.xml
    default-schema: ${NOTIFICATION_DB_SCHEMA:notification_schema}

  jpa:
    properties:
      hibernate:
        default_schema: ${NOTIFICATION_DB_SCHEMA:notification_schema}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/bank-realm

  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        enabled: true
        register: true
        service-name: notification-app
        health-check-path: /actuator/health
        health-check-interval: 10s
        prefer-ip-address: true

      config:
        enabled: true
        prefixes:
          - config
        default-context: application
        format: YAML
  config:
    import: "optional:consul:"

management:
  endpoints:
    web:
      exposure:
        include: "*"
logging:
  level:
    root: INFO
