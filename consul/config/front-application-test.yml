spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  sql:
    init:
      mode: never
      schema-locations: classpath:schema.sql
  liquibase:
    enabled: false
  cloud:
    consul:
      config:
        enabled: false
