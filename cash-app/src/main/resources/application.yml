server:
  port: 8083

spring:
  application:
    name: cash-app
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:bank_db}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:qwerty}

  liquibase:
    enabled: true
    change-log: classpath:db/master.xml
    default-schema: ${CASH_DB_SCHEMA:cash_schema}

  jpa:
    properties:
      hibernate:
        default_schema: ${CASH_DB_SCHEMA:cash_schema}
    show-sql: true
    hibernate:
      ddl-auto: none

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/bank-realm
      client:
        registration:
          cash-app:
            provider: keycloak
            client-id: cash-app
            client-secret: cash-app-secret
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            issuer-uri: http://localhost:8080/realms/bank-realm

bank:
  account-gateway:
    base-url: http://localhost:8086/accounts
  notification-gateway:
    base-url: http://localhost:8086/notification

management:
  endpoints:
    web:
      exposure:
        include: "*"
logging:
  level:
    root: INFO
    org.springframework.cloud.consul: DEBUG