version: '3.9'

services:
  postgres:
    image: postgres:17.5
    container_name: bank-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - bank-network

  consul:
    image: hashicorp/consul:1.15
    container_name: bank-consul
    command: agent -server -ui -bootstrap-expect=1 -client=0.0.0.0
    ports:
      - "${CONSUL_PORT}:8500"
      - "8600:8600/udp"
    networks:
      - bank-network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: bank-keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /health/live HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep 'UP'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import
    networks:
      - bank-network

  gateway-service:
    build: ./gateway-service
    container_name: bank-gateway-consul-service
    depends_on:
      keycloak:
        condition: service_healthy
    ports:
      - "8086:8080"
    environment:
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_CLOUD_CONSUL_PORT: 8500
      KEYCLOAK_URL: http://keycloak:8080
    networks:
      - bank-network

  front-app:
    build: ./front-app
    container_name: bank-front-app
    depends_on:
      postgres:
        condition: service_started
      consul:
        condition: service_started
      keycloak:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_CLOUD_CONSUL_PORT: 8500
      BANK_CASH_GATEWAY_BASE_URL: http://gateway-service:8080/cash
      BANK_ACCOUNT_GATEWAY_BASE_URL: http://gateway-service:8080/accounts
      BANK_TRANSFER_GATEWAY_BASE_URL: http://gateway-service:8080/transfer
    networks:
      - bank-network

  account-app:
    build: ./account-app
    container_name: bank-account-app
    depends_on:
      postgres:
        condition: service_started
      consul:
          condition: service_started
      keycloak:
          condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      DB_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_CLOUD_CONSUL_PORT: 8500
      KEYCLOAK_URL: http://keycloak:8080
      SPRING_CLOUD_CONSUL_DISCOVERY_PREFER-IP-ADDRESS: "true"
    networks:
      - bank-network

  cash-app:
    build: ./cash-app
    container_name: bank-cash-app
    depends_on:
      postgres:
        condition: service_started
      consul:
          condition: service_started
      keycloak:
          condition: service_healthy
    ports:
      - "8083:8080"
    environment:
      DB_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_CLOUD_CONSUL_PORT: 8500
      KEYCLOAK_URL: http://keycloak:8080
      SPRING_CLOUD_CONSUL_DISCOVERY_PREFER-IP-ADDRESS: "true"
    networks:
      - bank-network

  transfer-app:
    build: ./transfer-app
    container_name: bank-transfer-app
    depends_on:
      postgres:
        condition: service_started
      consul:
        condition: service_started
      keycloak:
        condition: service_healthy
    ports:
      - "8084:8080"
    environment:
      DB_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_CLOUD_CONSUL_PORT: 8500
      KEYCLOAK_URL: http://keycloak:8080
      SPRING_CLOUD_CONSUL_DISCOVERY_PREFER-IP-ADDRESS: "true"
    networks:
      - bank-network

  notification-app:
    build: ./notification-app
    container_name: bank-notification-app
    depends_on:
      postgres:
        condition: service_started
      consul:
        condition: service_started
      keycloak:
        condition: service_healthy
    ports:
      - "8085:8080"
    environment:
      DB_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_CLOUD_CONSUL_PORT: 8500
      KEYCLOAK_URL: http://keycloak:8080
      SPRING_CLOUD_CONSUL_DISCOVERY_PREFER-IP-ADDRESS: "true"
    networks:
      - bank-network

volumes:
  postgres_data:

networks:
  bank-network:
    driver: bridge