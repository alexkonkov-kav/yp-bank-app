apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "account-chart.fullname" . }}-config
  labels:
    {{- include "account-chart.labels" . | nindent 4 }}

data:
  SPRING_DATASOURCE_URL: {{ .Values.config.datasourceUrl | quote }}
  ACCOUNT_DB_SCHEMA: {{ .Values.config.schema | quote }}
  SPRING_LIQUIBASE_DEFAULT_SCHEMA: {{ .Values.config.schema | quote }}
  SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: {{ .Values.config.schema | quote }}
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info"
  MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
  MANAGEMENT_SERVER_PORT: "8082"
  SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: {{ .Values.config.keycloakIssuerUri | quote }}
  SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_ISSUER_URI: {{ .Values.config.keycloakIssuerUri | quote }}