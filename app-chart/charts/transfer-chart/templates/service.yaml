apiVersion: v1
kind: Service
metadata:
  name: {{ include "transfer-chart.fullname" . }}
  labels:
    {{- include "transfer-chart.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8084
      protocol: TCP
      name: http
      nodePort: {{ .Values.nodePortService.port }}
  selector:
    {{- include "transfer-chart.selectorLabels" . | nindent 4 }}
