replicaCount: 1

image:
  repository: postgres
  tag: "16"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 5432

storage:
  size: 1Gi
  storageClass: ""
nameOverride:  "postgres"
fullnameOverride:  "postgres"
secretName: postgres-secret
configMapName: postgres-config
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""
ingress:
   enabled: false
httpRoute:
  enabled: false
autoscaling:
  enabled: false

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""

resources:
  requests:
    memory: 512Mi
  limits:
    memory: 1Gi