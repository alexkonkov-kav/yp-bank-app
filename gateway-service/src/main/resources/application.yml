server:
  port: 8086

spring:
  cloud:
    gateway:
      default-filters:
        - JwtTokenRelay
      routes:
        #Account
        - id: account-app
          uri: http://localhost:8082
          predicates:
            - Path=/accounts/**

        #Cash
        - id: cash-app
          uri: http://localhost:8083
          predicates:
            - Path=/cash/**

        #Transfer
        - id: transfer-app
          uri: http://localhost:8084
          predicates:
            - Path=/transfer/**

        #Notification
        - id: notification-app
          uri: http://localhost:8085
          predicates:
            - Path=/notification/**
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8080/realms/bank-realm}
          #issuer-uri: http://host.docker.internal:8080/realms/bank-realm

management:
  endpoints:
    web:
      exposure:
        include: "*"
logging:
  level:
    root: INFO